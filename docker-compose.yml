version: "3.8"

services:
  # ─── Certificate Generator Service ─────────────────────────
  # Generates a valid Local Root CA and signed server certificates with all required
  # Subject Alternative Names (SANs) for secure and trusted node connection.
  cert-generator:
    image: alpine:latest
    container_name: rocketmq-cert-generator
    volumes:
      - ./data/tls:/certs
    command: >
      sh -c "
      apk add --no-cache openssl &&
      if [ ! -f /certs/server.pem ]; then
        echo 'Generating CA and server certificates...' &&
        # 1. Create CA private key and self-signed root certificate
        openssl genrsa -out /certs/ca.key 4096 &&
        openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 3650 -subj '/CN=RocketMQ Local CA/O=Edilson Pateguana/C=MZ' -out /certs/ca.pem &&
        
        # 2. Create server private key
        openssl genrsa -out /certs/server.key 2048 &&
        
        # 3. Create openssl config with SAN extensions
        cat <<EOF > /certs/openssl.cnf
        [req]
        default_bits = 2048
        prompt = no
        default_md = sha256
        req_extensions = req_ext
        distinguished_name = dn
        
        [dn]
        C = MZ
        O = Edilson Pateguana
        CN = localhost
        
        [req_ext]
        subjectAltName = @alt_names
        
        [alt_names]
        DNS.1 = localhost
        DNS.2 = node1
        DNS.3 = node2
        DNS.4 = node3
        DNS.5 = rocketmq-node1
        DNS.6 = rocketmq-node2
        DNS.7 = rocketmq-node3
        IP.1 = 127.0.0.1
        EOF
        
        # 4. Create CSR
        openssl req -new -key /certs/server.key -config /certs/openssl.cnf -out /certs/server.csr &&
        
        # 5. Sign the server CSR with local CA
        openssl x509 -req -in /certs/server.csr -CA /certs/ca.pem -CAkey /certs/ca.key -CAcreateserial -out /certs/server.pem -days 3650 -sha256 -extfile /certs/openssl.cnf -extensions req_ext &&
        
        # 6. Clean up CSR and temporary config file
        rm /certs/server.csr /certs/openssl.cnf &&
        echo 'Certificates successfully generated!'
      else
        echo 'Certificates already exist.'
      fi
      "

  # ─── Broker Node 1 ─────────────────────────────────────────
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rocketmq-node1
    environment:
      - ROCKETMQ_NODE_ID=1
      - ROCKETMQ_BIND_HOST=0.0.0.0
      - ROCKETMQ_CLUSTER_ADDR=0.0.0.0:5680
      - ROCKETMQ_CLUSTER_SEEDS=""
      - ROCKETMQ_AMQP_PORT=5672
      - ROCKETMQ_AMQPS_PORT=5671
      - ROCKETMQ_MGMT_PORT=15672
      - RUST_LOG=info
    ports:
      - "5672:5672"
      - "5675:5671"    # Host port 5675 -> Container TLS port 5671
      - "15672:15672"
      - "5680:5680"
    volumes:
      - node1-data:/app/data
      - ./data/tls:/app/data/tls:ro  # Mount the generated valid certificates read-only
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    networks:
      - rocketmq-net

  # ─── Broker Node 2 ─────────────────────────────────────────
  node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rocketmq-node2
    environment:
      - ROCKETMQ_NODE_ID=2
      - ROCKETMQ_BIND_HOST=0.0.0.0
      - ROCKETMQ_CLUSTER_ADDR=0.0.0.0:5680
      - ROCKETMQ_CLUSTER_SEEDS=node1:5680
      - ROCKETMQ_AMQP_PORT=5672
      - ROCKETMQ_AMQPS_PORT=5671
      - ROCKETMQ_MGMT_PORT=15672
      - RUST_LOG=info
    ports:
      - "5673:5672"
      - "5676:5671"    # Host port 5676 -> Container TLS port 5671
      - "15673:15672"
    volumes:
      - node2-data:/app/data
      - ./data/tls:/app/data/tls:ro  # Mount the generated valid certificates read-only
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      node1:
        condition: service_started
    networks:
      - rocketmq-net

  # ─── Broker Node 3 ─────────────────────────────────────────
  node3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rocketmq-node3
    environment:
      - ROCKETMQ_NODE_ID=3
      - ROCKETMQ_BIND_HOST=0.0.0.0
      - ROCKETMQ_CLUSTER_ADDR=0.0.0.0:5680
      - ROCKETMQ_CLUSTER_SEEDS=node1:5680
      - ROCKETMQ_AMQP_PORT=5672
      - ROCKETMQ_AMQPS_PORT=5671
      - ROCKETMQ_MGMT_PORT=15672
      - RUST_LOG=info
    ports:
      - "5674:5672"
      - "5677:5671"    # Host port 5677 -> Container TLS port 5671
      - "15674:15672"
    volumes:
      - node3-data:/app/data
      - ./data/tls:/app/data/tls:ro  # Mount the generated valid certificates read-only
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      node1:
        condition: service_started
    networks:
      - rocketmq-net


  # ─── NestJS Integration Client ────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: rocketmq-client
    environment:
      - AMQP_URL=amqp://guest:guest@node1:5672/
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - node1
      - node2
      - node3
    networks:
      - rocketmq-net

volumes:
  node1-data:
  node2-data:
  node3-data:

networks:
  rocketmq-net:
    driver: bridge
