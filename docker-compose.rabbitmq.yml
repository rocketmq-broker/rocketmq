services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq-test
    ports:
      - "5673:5672"    # AMQP (offset to avoid conflict with your broker on 5672)
      - "15673:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
