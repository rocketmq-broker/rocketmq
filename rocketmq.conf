# ─── RocketMQ Broker Configuration ────────────────────────────────────────────
#
# All settings use key = value syntax. Lines starting with # are comments.
# If this file is absent, built-in defaults are used.
#
# Resolution order for each setting:
#   1. Environment variable (e.g. ROCKETMQ_AMQP_PORT)  — highest priority
#   2. This config file
#   3. Compiled default                                 — lowest priority
#
# To specify the path to this file, set ROCKETMQ_CONF=/path/to/rocketmq.conf.
# If unset, the broker looks for ./rocketmq.conf in the working directory.

# ─── Network ──────────────────────────────────────────────────────────────────

# Address to bind all listeners on.
bind_host = 127.0.0.1

# AMQP 0-9-1 plain TCP port.
amqp_port = 5672

# AMQP over TLS port.
amqps_port = 5671

# Management HTTP API port (serves the dashboard UI).
mgmt_port = 15672

# ─── TLS ──────────────────────────────────────────────────────────────────────

# Paths are relative to data_dir unless absolute.
tls_cert = tls/server.pem
tls_key = tls/server.key

# ─── Persistence ──────────────────────────────────────────────────────────────

# Root directory for WAL segments, user database, and TLS certificates.
data_dir = data

# Maximum segment file size in bytes before rotation (default 64 MB).
max_segment_size = 67108864

# How often to attempt WAL compaction (seconds).
wal_compact_interval_secs = 60

# Minimum entry count before compaction is considered.
wal_compact_threshold = 1000

# ─── Cluster ──────────────────────────────────────────────────────────────────

# Unique numeric identifier for this node.
node_id = 1

# Address this node listens on for inter-node cluster traffic.
cluster_addr = 127.0.0.1:5680

# Comma-separated list of seed node addresses to join.
# Leave empty for a standalone single-node broker.
cluster_seeds =

# ─── Authentication ──────────────────────────────────────────────────────────

# Default users created on first startup.
default_user = guest
default_pass = guest
admin_user = admin
admin_pass = 1234

# bcrypt cost factor for password hashing.
bcrypt_cost = 10

# ─── Connection ──────────────────────────────────────────────────────────────

# Fallback heartbeat interval in seconds (used when client negotiates 0).
heartbeat_secs = 60

# ─── Delivery Pipeline ───────────────────────────────────────────────────────

# Internal channel capacity per connection for outgoing frames.
delivery_channel_capacity = 256

# How often the delivery loop polls for ready messages (milliseconds).
delivery_poll_interval_ms = 5

# ─── Background Tasks ────────────────────────────────────────────────────────

# Interval for checking queue TTL expiration (milliseconds).
queue_ttl_check_interval_ms = 1000

# Interval for checking per-message TTL expiration (milliseconds).
message_ttl_check_interval_ms = 500

# Interval for evicting stale deduplication cache entries (seconds).
dedup_eviction_interval_secs = 10

# Window during which duplicate message-ids are rejected (seconds).
dedup_window_secs = 300

# Interval for flushing delayed messages into target queues (milliseconds).
delay_flush_interval_ms = 100

# ─── Management UI ────────────────────────────────────────────────────────────

# Directory containing the static dashboard assets.
www_dir = src/management/www

# ─── Logging ──────────────────────────────────────────────────────────────────

# tracing/env_filter compatible log level string.
log_filter = rocketmq=debug
